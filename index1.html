<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>مكتبة الذكاء القانوني</title>

<style>

body{
margin:0;
font-family: Arial;
direction: rtl;
background: linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
}

.header{
padding:40px;
}

.search{
padding:14px;
width:70%;
border-radius:15px;
border:none;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:20px;
}

.card{
background:#0f172a;
padding:25px;
border-radius:20px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

button{
padding:14px 25px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<h1>🤖📚 مكتبة الذكاء القانوني</h1>
<p>كتب في القانون والذكاء الاصطناعي</p>

<input class="search" placeholder="ابحث عن كتاب..." onkeyup="searchBook()">
</div>

<div class="grid" id="books">

<div class="card">
<h2>⚖️ كتاب القانون الحديث</h2>
<p>أساسيات القانون بأسلوب عصري</p>
<button>شراء الآن</button>
</div>

<div class="card">
<h2>🤖 الذكاء الاصطناعي والقانون</h2>
<p>كيف يؤثر الذكاء الاصطناعي على التشريعات</p>
<button>شراء الآن</button>
</div>

</div>

<script>

function searchBook(){
let input = document.querySelector(".search").value.toLowerCase();
let cards = document.querySelectorAll(".card");

cards.forEach(card=>{
if(card.innerText.toLowerCase().includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}
});
}

</script>

</body>
</html>
