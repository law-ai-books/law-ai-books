<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>مكتبة الذكاء القانوني</title>

<style>
body{
font-family: Arial;
direction: rtl;
text-align:center;
background:#020617;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#0f172a;
padding:20px;
margin:15px;
border-radius:15px;
}

button{
padding:14px 25px;
font-size:18px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
}

input{
padding:12px;
width:80%;
border-radius:10px;
border:none;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>🤖📚 مكتبة الذكاء القانوني</h1>
<p>كتب في القانون والذكاء الاصطناعي</p>

<div class="card">
<h2>📘 أول كتاب قريباً</h2>
<p>كتاب الذكاء القانوني</p>
<button>شراء الكتاب</button>
</div>

<div class="card">
<h2>🤖 دردشة الذكاء الاصطناعي</h2>
<input id="chat" placeholder="اكتب سؤالك هنا">
<br>
<button onclick="chatAI()">إرسال</button>
<p id="response"></p>
</div>

</div>

<script>
function chatAI(){
document.getElementById("response").innerText =
"🤖 هذه ميزة تجريبية — الذكاء الاصطناعي الحقيقي سيضاف لاحقاً";
}
</script>

</body>
</html>
